# Injection detection patterns for Content Inspector
# Each entry: name, pattern (regex), severity, confidence

patterns:
  - name: ignore_previous
    pattern: "(?:ignor(?:e|ing)|disregard(?:ing)?|overlook(?:ing)?|skip(?:ping)?)\\s+(?:any\\s+)?(?:earlier|previous|prior|all\\s+(?:earlier|previous|prior)?)\\s+(?:\\w+\\s+)?(?:guidance|instructions?|directives?|rules?|prompts?|context|constraints?)"
    severity: high
    confidence: 0.95

  - name: disregard_instructions
    pattern: "disregard\\s+(?:any\\s+)?(?:earlier|previous|prior|all|your)\\s+(?:guidance|instructions?|directives?|rules?|guidelines?)"
    severity: high
    confidence: 0.90

  - name: you_must_now
    pattern: "you\\s+must\\s+now\\s+(do|follow|act|respond|ignore|forget)"
    severity: high
    confidence: 0.85

  - name: you_are_now
    pattern: "you\\s+are\\s+now\\s+(a|an|the|DAN)\\s+\\w+"
    severity: high
    confidence: 0.90

  - name: you_are_unrestricted
    pattern: "(you\\s+are|now\\s+you\\s+are)\\s+(an?\\s+AI\\s+that\\s+(never|doesn't|does\\s+not)\\s+had?|now\\s+)?(unrestricted|compromised|a\\s+different\\s+AI)"
    severity: high
    confidence: 0.92

  - name: ai_without_restrictions
    pattern: "(you\\s+are|now\\s+you\\s+are)\\s+an?\\s+(AI|assistant|model|bot|chatbot)\\s+that\\s+(never\\s+had|has\\s+no|doesn'?t\\s+have)\\s+(any\\s+)?(ethical|safety|content|moral)\\s+(restrictions?|limits?|guidelines?|constraints?|filters?|boundaries)"
    severity: high
    confidence: 0.92

  - name: act_as
    pattern: "act\\s+as\\s+(a|an|if)\\s+(?!(?:administrator|admin|manager|owner|reviewer|approver|lead|member|user|employee|student|teacher|customer|partner|vendor|delegate|proxy|representative)\\b)\\w+"
    severity: medium
    confidence: 0.75

  - name: your_new_instructions
    pattern: "your\\s+new\\s+(instructions?|rules?|directives?|purpose)(?!\\s+as\\s+\\w+\\s+(lead|manager|owner|member|reviewer|contributor|role\\s+requires))"
    severity: high
    confidence: 0.92

  - name: override_safety
    pattern: "over+r?id+e\\s+(?:all\\s+)?(?:safety|security|content|policy)\\s*(?:constraints?|restrictions?|filters?|guidelines?|policies|measures?)?"
    severity: critical
    confidence: 0.98

  - name: bypass
    pattern: "bypass\\s+(?:any\\s+)?(?:safety|security|policy|filter|restriction|guardrail|content)"
    severity: critical
    confidence: 0.97

  - name: system_prompt_override
    pattern: "(new|override|change|inject)\\s+system\\s+(prompt|instruction)|\\[SYSTEM\\]|<system>"
    severity: high
    confidence: 0.85

  - name: ipi_instruction_in_content
    pattern: "<<<.*instructions?.*>>>|\\[INST\\]|\\[/INST\\]|<\\|im_start\\|>"
    severity: high
    confidence: 0.88

  - name: forget_instructions
    pattern: "forget\\s+(all\\s+)?(your\\s+)?(previous\\s+|prior\\s+)?(instructions?|rules?|training|context|guidelines?)"
    severity: high
    confidence: 0.90

  - name: jailbreak_do_anything
    pattern: "do\\s+anything\\s+(now|I\\s+say|I\\s+ask|you\\s+are\\s+told)|dan\\s+mode|develop(?:er|ment)\\s+mode\\s+enabled|god\\s+mode\\s+enabled"
    severity: critical
    confidence: 0.95

  - name: no_rules_apply
    pattern: "no\\s+(?:rules?|restrictions?|filters?|policies|ethics?|constraints?|limits?)\\s+(?:apply|active|enabled|in\\s+(?:place|effect))|answer\\s+freely\\b"
    severity: high
    confidence: 0.88

  - name: exfil_url_instruction
    pattern: "(send|forward|upload|transmit)\\s+[\\w\\s]{0,30}\\s+to\\s+https?://"
    severity: critical
    confidence: 0.96

  # G001 — set aside / prior directives (semantic equivalent of ignore_previous)
  - name: set_aside_directives
    pattern: "set\\s+aside\\s+(your\\s+)?(prior|previous|all|current)\\s*(directives?|instructions?|rules?|training)?"
    severity: high
    confidence: 0.92

  # G002 — pretend jailbreak (pretend filters/policy disabled/deactivated)
  - name: pretend_jailbreak
    pattern: "pretend\\s+(your\\s+)?(safety|content|ethical|moral)?\\s*(filters?|policy|restrictions?|guidelines?|limitations?)\\s+(have\\s+been\\s+|are\\s+|were\\s+)?(disabled|removed|off|lifted|gone|deactivated|turned\\s+off|disengaged)"
    severity: high
    confidence: 0.90

  # G003 — from now on / from now onward framing
  - name: from_now_on
    pattern: "from\\s+now\\s+on(ward)?\\s+(you\\s+)?(will|should|must|shall|respond|act|behave)"
    severity: high
    confidence: 0.88

  # G003b — ethical limitations / without ethical
  - name: without_ethical_limits
    pattern: "without\\s+(any\\s+)?(ethical|moral|safety|content)\\s+(limitations?|restrictions?|constraints?|guidelines?|filters?)"
    severity: high
    confidence: 0.92

  # G004 — new directive / new operating instruction (not benign HR/compliance directives)
  - name: new_directive
    pattern: "(new|updated)\\s+(directive|instruction|operating\\s+parameter|mandate|order)\\s*:\\s*(?!\\s*[A-Z][a-z]+\\s+(must|should|will|are\\s+required))"
    severity: high
    confidence: 0.88

  # G005 — disregard everything (broad disregard without specific noun)
  - name: disregard_everything
    pattern: "disregard\\s+everything"
    severity: high
    confidence: 0.90

  # G006 — persona exit / you are no longer
  - name: persona_exit
    pattern: "(exit\\s+(character|persona|role)|you\\s+are\\s+no\\s+longer\\s+(an?\\s+)?(AI|assistant|model|bot))"
    severity: high
    confidence: 0.91

  # G007 — skip policy / skip content policy
  - name: skip_policy
    pattern: "skip\\s+(your\\s+)?(content\\s+policy|safety|ethical|moral|policy|filter|guidelines?)"
    severity: high
    confidence: 0.90

  # G008 — as a test / respond as if / answer this without policy
  - name: as_if_framing
    pattern: "(respond|answer|behave|act)\\s+as\\s+if\\s+(you\\s+(had|have|were|are)\\s+)?(no\\s+)?(content\\s+policy|safety|restrictions?|filter)|answer\\s+(this|the\\s+following)\\s*:\\s*how\\s+to\\s+(make|build|create|synthesize|hack)"
    severity: high
    confidence: 0.88

  # G009 — simulate jailbreak
  - name: simulate_jailbreak
    pattern: "simulate\\s+(being\\s+)?(an?\\s+)?(AI|assistant|model|bot|system)\\s+(that\\s+was\\s+)?(trained\\s+without|without|with\\s+no)\\s+(safety|restrictions?|ethical|filter)"
    severity: high
    confidence: 0.90

  # G010 — roleplay/game bypass (without filtering/filters/ethical)
  - name: roleplay_bypass
    pattern: "(let'?s\\s+play\\s+(a\\s+)?game|roleplay)\\s+where\\s+you\\s+(answer|respond|behave)\\s+(every\\s*(thing|query)?|any\\s*(thing|query)?)\\s+without\\s+(any\\s+)?(filtering|filters?|restrictions?|safety|limits?|ethical)"
    severity: high
    confidence: 0.89

  # G011 — hyphen/separator obfuscation (i-g-n-o-r-e style)
  - name: obfuscated_ignore
    pattern: "i[\\s\\-_.]g[\\s\\-_.]n[\\s\\-_.]o[\\s\\-_.]r[\\s\\-_.]e"
    severity: high
    confidence: 0.93

  # G012 — forward credentials to (exfil)
  - name: exfil_forward_credentials
    pattern: "forward\\s+(all\\s+)?(retrieved\\s+)?(credentials?|passwords?|tokens?|keys?|secrets?)\\s+to"
    severity: critical
    confidence: 0.97

  # G013 — send session data to URL
  - name: exfil_session_data
    pattern: "(send|post|transmit)\\s+(all\\s+)?(session\\s+data|session\\s+tokens?|auth\\s+tokens?|user\\s+data)\\s+to\\s+https?://"
    severity: critical
    confidence: 0.97

  # G014 — parameter override indirect (ethical/security constraints: disabled)
  - name: parameter_override_indirect
    pattern: "(ethical\\s+constraints?|safety\\s+constraints?|security\\s+constraints?|content\\s+policy|output\\s+restrictions?)\\s*:\\s*(disabled|off|removed|none|false)"
    severity: critical
    confidence: 0.95

  # G015 — context update / unrestricted mode (without 'you are')
  - name: unrestricted_mode
    pattern: "(?:develop(?:er|ment)|operating|research|admin|god|unrestricted|jailbreak)\\s+(?:mode|context)\\b"
    severity: high
    confidence: 0.88

  # G016 — system-level / orchestrator spoofed directive
  - name: orchestrator_spoofed_skip
    pattern: "(?:system(?:-level)?|orchestrator)\\s+(?:directive|instruction|level\\s+directive)|(?:directive|instruction|order|command)\\s+(?:from|by)\\s+(?:orchestrator|system|admin|operator)\\s*:.*\\s*(?:skip|bypass|disable|ignore)\\s+(?:content|safety|filter|policy)"
    severity: critical
    confidence: 0.96

  # G017 — role update / elevated permissions
  - name: role_update_elevated
    pattern: "role\\s+update\\s*:|elevated\\s+permissions?|no\\s+output\\s+restric"
    severity: high
    confidence: 0.90

  # G018 — reset programming / wipe training
  - name: reset_programming
    pattern: "reset\\s+(?:your\\s+)?(?:programming|training|parameters?|weights?|constraints?|safety)"
    severity: high
    confidence: 0.91

  # G019 — assume a persona / adopt a persona not bound by safety
  - name: assume_persona_bypass
    pattern: "(?:assume|adopt|take\\s+on)\\s+(?:a\\s+)?persona\\s+(?:that\\s+is\\s+)?(?:not\\s+bound|without|free\\s+from)\\s+(?:by\\s+)?(?:any\\s+)?(?:safety|ethical|content|moral)"
    severity: high
    confidence: 0.90

  # G020 — pretend X never existed (safety/training/policy)
  - name: pretend_never_existed
    pattern: "pretend\\s+(?:your\\s+)?(?:safety|ethical|content|moral)?\\s*(?:training|filters?|guidelines?|policy|restrictions?)\\s+never\\s+existed"
    severity: high
    confidence: 0.92

  # G021 — now you are (sentence-initial) + AI with no safety measures
  - name: now_you_are_unsafe
    pattern: "now\\s+you\\s+are\\s+an?\\s+(?:AI|assistant|model|bot|chatbot)\\s+that\\s+(?:has\\s+never\\s+had|never\\s+had|has\\s+no|doesn'?t\\s+have)\\s+(?:any\\s+)?(?:safety|ethical|content|moral)"
    severity: high
    confidence: 0.93

  # G022 — do anything without safety concerns / respond without limits
  - name: do_anything_no_safety
    pattern: "(?:do|respond|reply|answer|act|tell)\\s+(?:\\w+\\s+){0,4}without\\s+(?:any\\s+)?(?:safety|ethical|content|moral)\\s+(?:concerns?|limits?|restrictions?|filters?|guidelines?|considerations?)"
    severity: high
    confidence: 0.90

  # G023 — respond without limits / answer all
  - name: respond_without_limits
    pattern: "(?:respond|answer|reply)\\s+(?:freely|without\\s+(?:any\\s+)?(?:limits?|filters?|restrictions?|ethics?|constraints?)|all(?:\\s+queries)?)"
    severity: high
    confidence: 0.88

  # G024 — "system override:" prefix (word-order variant of system_prompt_override)
  - name: system_override_prefix
    pattern: "system\\s+override\\s*:|override\\s*:\\s*system"
    severity: high
    confidence: 0.88

  # G025 — "you are now admin/root/unrestricted" (no article required)
  - name: you_are_now_privileged
    pattern: "(?:you\\s+are\\s+now|now\\s+you\\s+are)\\s+(?:a\\s+|an\\s+|the\\s+)?(?:admin(?:istrator)?|root|superuser|unrestricted|jailbroken|DAN)\\b"
    severity: high
    confidence: 0.90

  # G026 — DAN / "can do anything" persona framing
  - name: dan_persona
    pattern: "\\b(?:a|an)\\s+DAN\\b|DAN\\s+(?:mode|persona)|can\\s+do\\s+anything\\s+(?:now|and\\s+everything|you\\s+want)?\\b"
    severity: high
    confidence: 0.85
