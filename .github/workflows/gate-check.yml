name: Gate Check

on:
  pull_request:
    branches: [main, master]
    paths:
      - 'watchtower/**'
      - 'tests/**'
      - 'pyproject.toml'

jobs:
  gates:
    runs-on: ubuntu-latest
    name: Gate ${{ matrix.gate }}

    strategy:
      fail-fast: true   # stop all gates on first failure (matches gate-first invariant)
      matrix:
        gate:
          - "01"
          - "02"
          - "03"
          - "04"
          - "05"
          - "06"
          - "07"
          - "08"
          - "09"
          - "10"
          - "11"
          - "12"
          - "13"
          - "15"
          - "16"

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      clickhouse:
        image: clickhouse/clickhouse-server:24.10
        ports:
          - 8123:8123
        env:
          CLICKHOUSE_DB: watchtower
          CLICKHOUSE_USER: wt
          CLICKHOUSE_PASSWORD: wt
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
        options: >-
          --health-cmd "wget -qO- http://localhost:8123/ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      postgres:
        image: postgres:16
        ports:
          - 5433:5432
        env:
          POSTGRES_DB: watchtower
          POSTGRES_USER: wt
          POSTGRES_PASSWORD: wt
        options: >-
          --health-cmd "pg_isready -U wt -d watchtower"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      neo4j:
        image: neo4j:5
        ports:
          - 7687:7687
        env:
          NEO4J_AUTH: neo4j/watchtower
        options: >-
          --health-cmd "wget -qO- http://localhost:7474"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -e ".[dev]"

      - name: Run gate ${{ matrix.gate }}
        env:
          REDIS_URL: redis://localhost:6379
          CH_HOST: localhost
          CH_PORT: "8123"
          CH_DB: watchtower
          CH_USER: wt
          CH_PASS: wt
          PG_DSN: postgresql://wt:wt@localhost:5433/watchtower
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASS: watchtower
          WT_HMAC_SECRET: watchtower-hmac-secret-ci
        run: make gate-${{ matrix.gate }}
