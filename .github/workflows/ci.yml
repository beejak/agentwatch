name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      REDIS_URL: redis://localhost:6379
      CH_HOST: localhost
      CH_PORT: "8123"
      CH_DB: watchtower
      CH_USER: wt
      CH_PASS: wt
      PG_DSN: postgresql://wt:wt@localhost:5433/watchtower
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASS: watchtower
      WT_HMAC_SECRET: watchtower-hmac-secret-ci

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      clickhouse:
        image: clickhouse/clickhouse-server:24.10
        ports:
          - 8123:8123
          - 9000:9000
        env:
          CLICKHOUSE_DB: watchtower
          CLICKHOUSE_USER: wt
          CLICKHOUSE_PASSWORD: wt
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
        options: >-
          --health-cmd "wget -qO- http://localhost:8123/ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      postgres:
        image: postgres:16
        ports:
          - 5433:5432
        env:
          POSTGRES_DB: watchtower
          POSTGRES_USER: wt
          POSTGRES_PASSWORD: wt
        options: >-
          --health-cmd "pg_isready -U wt -d watchtower"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      neo4j:
        image: neo4j:5
        ports:
          - 7687:7687
          - 7474:7474
        env:
          NEO4J_AUTH: neo4j/watchtower
          NEO4J_PLUGINS: '["apoc"]'
        options: >-
          --health-cmd "wget -qO- http://localhost:7474"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -e ".[dev]"

      - name: Wait for ClickHouse
        run: |
          for i in {1..30}; do
            if wget -qO- http://localhost:8123/ping; then break; fi
            sleep 2
          done

      - name: Run all gate tests (gate-first, fast fail)
        run: make gate-all

      - name: Run full test suite (poc + scenarios + eval, with coverage)
        run: make test
